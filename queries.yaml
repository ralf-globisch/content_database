summary:
  label: "Summary — counts and sizes by media type"
  sql: |
    SELECT
      media_type,
      count(*)                              AS files,
      round(sum(size_bytes)  / 1e9, 2)     AS total_gb,
      round(avg(size_bytes)  / 1e6, 1)     AS avg_mb
    FROM media_files
    GROUP BY 1
    ORDER BY 2 DESC

by_video_codec:
  label: "Video — by codec (summary)"
  sql: |
    SELECT
      video_codec,
      count(*)                             AS files,
      round(avg(width),  0)::INT           AS avg_width,
      round(avg(height), 0)::INT           AS avg_height,
      round(avg(fps),    2)                AS avg_fps,
      round(avg(video_bitrate) / 1e6, 2)  AS avg_bitrate_mbps
    FROM media_metadata
    WHERE video_codec IS NOT NULL
    GROUP BY 1
    ORDER BY 2 DESC

files_by_codec:
  label: "Video — files by codec (detail)"
  sql: |
    SELECT
      f.s3_key,
      m.video_codec,
      m.width::TEXT || 'x' || m.height::TEXT  AS resolution,
      round(m.fps, 2)                          AS fps,
      round(m.video_bitrate / 1e6, 2)          AS bitrate_mbps,
      round(m.duration_s, 1)                   AS duration_s,
      round(f.size_bytes / 1e6, 1)             AS size_mb
    FROM media_metadata m
    JOIN media_files f USING (s3_key)
    WHERE m.video_codec IS NOT NULL
    ORDER BY f.size_bytes DESC

by_resolution:
  label: "Video — by resolution (summary)"
  sql: |
    SELECT
      width::TEXT || 'x' || height::TEXT   AS resolution,
      video_codec,
      count(*)                             AS files
    FROM media_metadata
    WHERE width IS NOT NULL
    GROUP BY 1, 2
    ORDER BY 3 DESC

files_by_resolution:
  label: "Video — files by resolution (detail)"
  sql: |
    SELECT
      f.s3_key,
      m.width::TEXT || 'x' || m.height::TEXT  AS resolution,
      m.video_codec,
      round(m.fps, 2)                          AS fps,
      round(m.video_bitrate / 1e6, 2)          AS bitrate_mbps,
      round(m.duration_s, 1)                   AS duration_s,
      round(f.size_bytes / 1e6, 1)             AS size_mb,
      f.top_prefix
    FROM media_metadata m
    JOIN media_files f USING (s3_key)
    WHERE m.width IS NOT NULL
    ORDER BY m.width DESC, m.height DESC, f.s3_key

hdr:
  label: "HDR and Dolby Vision (summary)"
  sql: |
    SELECT
      hdr_format,
      dolby_vision,
      dv_profile,
      dv_level,
      color_primaries,
      color_transfer,
      count(*)  AS files
    FROM media_metadata
    WHERE hdr_format IS NOT NULL OR dolby_vision = true
    GROUP BY 1, 2, 3, 4, 5, 6
    ORDER BY 7 DESC

files_hdr:
  label: "HDR and Dolby Vision — files (detail)"
  sql: |
    SELECT
      f.s3_key,
      m.hdr_format,
      m.dolby_vision,
      m.dv_profile,
      m.dv_level,
      m.color_primaries,
      m.color_transfer,
      m.video_codec,
      m.width::TEXT || 'x' || m.height::TEXT  AS resolution,
      round(f.size_bytes / 1e6, 1)             AS size_mb
    FROM media_metadata m
    JOIN media_files f USING (s3_key)
    WHERE m.hdr_format IS NOT NULL OR m.dolby_vision = true
    ORDER BY m.dolby_vision DESC, m.hdr_format, f.s3_key

dolby_atmos:
  label: "Dolby Atmos — tracks (detail)"
  sql: |
    SELECT
      f.s3_key,
      a.track_index,
      a.codec,
      a.channels,
      a.language,
      a.dolby_codec_family,
      round(f.size_bytes / 1e6, 1)  AS size_mb
    FROM audio_tracks a
    JOIN media_files f USING (s3_key)
    WHERE a.dolby_atmos = true
    ORDER BY f.s3_key, a.track_index

audio_by_language:
  label: "Audio — by language (summary)"
  sql: |
    SELECT
      language,
      codec,
      channels,
      count(*)  AS tracks
    FROM audio_tracks
    GROUP BY 1, 2, 3
    ORDER BY 4 DESC

files_by_language:
  label: "Audio — files by language (detail)"
  sql: |
    SELECT
      f.s3_key,
      a.language,
      a.codec,
      a.channels,
      a.dolby_atmos,
      a.dolby_codec_family,
      round(f.size_bytes / 1e6, 1)  AS size_mb
    FROM audio_tracks a
    JOIN media_files f USING (s3_key)
    ORDER BY a.language, f.s3_key, a.track_index

errors:
  label: "Files with probe errors"
  sql: |
    SELECT
      f.s3_key,
      round(f.size_bytes / 1e6, 1)  AS size_mb,
      m.error
    FROM media_metadata m
    JOIN media_files f USING (s3_key)
    WHERE m.error IS NOT NULL
    ORDER BY f.size_bytes DESC

largest_files:
  label: "Largest files (top 100)"
  sql: |
    SELECT
      f.s3_key,
      round(f.size_bytes / 1e6, 1)             AS size_mb,
      m.video_codec,
      m.width::TEXT || 'x' || m.height::TEXT   AS resolution,
      round(m.duration_s, 1)                   AS duration_s,
      f.extension,
      f.top_prefix
    FROM media_files f
    LEFT JOIN media_metadata m USING (s3_key)
    ORDER BY f.size_bytes DESC
    LIMIT 100

by_prefix:
  label: "Content by top-level prefix (summary)"
  sql: |
    SELECT
      top_prefix,
      count(*)                          AS files,
      round(sum(size_bytes) / 1e9, 2)  AS total_gb
    FROM media_files
    GROUP BY 1
    ORDER BY 2 DESC

files_by_prefix:
  label: "Content by top-level prefix (detail)"
  sql: |
    SELECT
      f.s3_key,
      f.top_prefix,
      f.extension,
      round(f.size_bytes / 1e6, 1)             AS size_mb,
      m.video_codec,
      m.width::TEXT || 'x' || m.height::TEXT   AS resolution,
      round(m.duration_s, 1)                   AS duration_s
    FROM media_files f
    LEFT JOIN media_metadata m USING (s3_key)
    ORDER BY f.top_prefix, f.size_bytes DESC

vision_summary:
  label: "Vision — content style summary"
  sql: |
    SELECT
      style,
      brightness,
      count(*)                                AS files,
      sum(CASE WHEN has_credits THEN 1 ELSE 0 END) AS with_credits
    FROM content_vision
    GROUP BY style, brightness
    ORDER BY files DESC

vision_animated:
  label: "Vision — animated content"
  sql: |
    SELECT
      v.s3_key,
      v.style,
      v.brightness,
      v.genre_tags,
      v.description,
      round(f.size_bytes / 1e6, 1)  AS size_mb
    FROM content_vision v
    JOIN media_files f USING (s3_key)
    WHERE v.style IN ('animated', 'cgi')
    ORDER BY f.size_bytes DESC

vision_credits:
  label: "Vision — files with ending credits"
  sql: |
    SELECT
      v.s3_key,
      v.style,
      v.genre_tags,
      v.description,
      round(f.size_bytes / 1e6, 1)  AS size_mb,
      round(m.duration_s, 1)        AS duration_s
    FROM content_vision v
    JOIN media_files f USING (s3_key)
    LEFT JOIN media_metadata m USING (s3_key)
    WHERE v.has_credits = true
    ORDER BY f.size_bytes DESC

vision_dark:
  label: "Vision — dark / low-light content"
  sql: |
    SELECT
      v.s3_key,
      v.style,
      v.genre_tags,
      v.description,
      m.hdr_format,
      round(f.size_bytes / 1e6, 1)  AS size_mb
    FROM content_vision v
    JOIN media_files f USING (s3_key)
    LEFT JOIN media_metadata m USING (s3_key)
    WHERE v.brightness = 'dark'
    ORDER BY f.size_bytes DESC

vision_all:
  label: "Vision — all analyzed files"
  sql: |
    SELECT
      v.s3_key,
      v.style,
      v.brightness,
      v.has_credits,
      v.genre_tags,
      v.description,
      round(f.size_bytes / 1e6, 1)  AS size_mb,
      v.analyzed_at
    FROM content_vision v
    JOIN media_files f USING (s3_key)
    ORDER BY v.analyzed_at DESC

vision_by_genre:
  label: "Vision — files by genre tag"
  sql: |
    SELECT
      genre,
      count(*)  AS files
    FROM (
      SELECT UNNEST(genre_tags) AS genre
      FROM content_vision
      WHERE genre_tags IS NOT NULL
    )
    GROUP BY genre
    ORDER BY files DESC

vision_genre_detail:
  label: "Vision — genre tag detail"
  sql: |
    SELECT
      v.s3_key,
      UNNEST(v.genre_tags)          AS genre,
      v.style,
      v.brightness,
      round(f.size_bytes / 1e6, 1)  AS size_mb
    FROM content_vision v
    JOIN media_files f USING (s3_key)
    WHERE v.genre_tags IS NOT NULL
    ORDER BY genre, f.size_bytes DESC

vision_errors:
  label: "Vision — files that failed analysis (error sentinels)"
  sql: |
    SELECT
      v.s3_key,
      v.description,
      v.analyzed_at,
      round(f.size_bytes / 1e6, 1)  AS size_mb
    FROM content_vision v
    JOIN media_files f USING (s3_key)
    WHERE v.description LIKE '[error:%'
    ORDER BY v.analyzed_at DESC

unanalyzed_files:
  label: "Vision — files not yet analyzed"
  sql: |
    SELECT
      f.s3_key,
      f.extension,
      round(f.size_bytes / 1e6, 1)             AS size_mb,
      m.video_codec,
      m.width::TEXT || 'x' || m.height::TEXT   AS resolution,
      round(m.duration_s, 1)                   AS duration_s
    FROM media_files f
    LEFT JOIN media_metadata m USING (s3_key)
    LEFT JOIN content_vision v USING (s3_key)
    WHERE f.media_type = 'video'
      AND v.s3_key IS NULL
    ORDER BY f.size_bytes DESC

duration_buckets:
  label: "Video — duration distribution"
  sql: |
    SELECT
      CASE
        WHEN duration_s <    60 THEN '< 1 min'
        WHEN duration_s <   300 THEN '1–5 min'
        WHEN duration_s <  1800 THEN '5–30 min'
        WHEN duration_s <  3600 THEN '30–60 min'
        ELSE                         '> 1 hour'
      END                            AS bucket,
      count(*)                       AS files,
      round(sum(m.duration_s) / 3600, 1) AS total_hours
    FROM media_metadata m
    JOIN media_files f USING (s3_key)
    WHERE f.media_type = 'video'
      AND m.duration_s IS NOT NULL
    GROUP BY 1
    ORDER BY min(duration_s)

metadata_gaps:
  label: "Metadata — missing or errored probes"
  sql: |
    SELECT
      f.s3_key,
      round(f.size_bytes / 1e6, 1)  AS size_mb,
      f.extension,
      CASE
        WHEN m.s3_key IS NULL   THEN 'not probed'
        WHEN m.error IS NOT NULL THEN 'probe error'
        WHEN m.duration_s IS NULL AND f.media_type = 'video' THEN 'missing duration'
        ELSE 'incomplete'
      END  AS issue,
      m.error
    FROM media_files f
    LEFT JOIN media_metadata m USING (s3_key)
    WHERE m.s3_key IS NULL
       OR m.error IS NOT NULL
       OR (m.duration_s IS NULL AND f.media_type = 'video')
    ORDER BY f.size_bytes DESC
